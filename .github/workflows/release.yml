name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            artifact_name: notely-macos-arm64
            build_command: npx electron-builder --mac dmg --arm64 --publish never
            artifact_paths: |
              release/*.dmg
              release/*.dmg.blockmap
              release/latest-mac.yml
              !release/builder-debug.yml
          - name: macOS x64
            os: macos-15-intel
            artifact_name: notely-macos-x64
            build_command: npx electron-builder --mac dmg --x64 --publish never
            artifact_paths: |
              release/*.dmg
              release/*.dmg.blockmap
              release/latest-mac.yml
              !release/builder-debug.yml
          - name: Windows x64
            os: windows-latest
            artifact_name: notely-windows-x64
            build_command: npx electron-builder --win nsis --x64 --publish never
            artifact_paths: |
              release/*.exe
              release/*.exe.blockmap
              release/latest*.yml
              !release/builder-debug.yml
          - name: Linux x64
            os: ubuntu-latest
            artifact_name: notely-linux-x64
            build_command: npx electron-builder --linux AppImage --x64 --publish never
            artifact_paths: |
              release/*.AppImage
              release/*.AppImage.blockmap
              release/latest*.yml
              !release/builder-debug.yml

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate tag matches package version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package application
        run: ${{ matrix.build_command }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts
          pattern: notely-*

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          mapfile -d '' FILES < <(find release-artifacts -type f -print0 | sort -z)

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No packaged artifacts found."
            exit 1
          fi

          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${FILES[@]}" --repo "$GH_REPO" --clobber
          else
            gh release create "$TAG_NAME" "${FILES[@]}" --repo "$GH_REPO" --title "$TAG_NAME" --generate-notes
          fi
